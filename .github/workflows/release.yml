name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Binaries
        run: |
          mkdir -p dist
          # Build for Linux (amd64)
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/project-builder-linux-amd64 .
          # Build for Windows (amd64)
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/project-builder-windows-amd64.exe .
          # Build for macOS (amd64)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/project-builder-darwin-amd64 .
          # Build for macOS (arm64)
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/project-builder-darwin-arm64 .
          # Copy desktop file for Linux release
          cp project-builder.desktop dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
