name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Extract Release Notes from CHANGELOG
        run: |
          # Strip the leading 'v' from the tag name (e.g. v1.1.3 -> 1.1.3)
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the section between the matching ## [VERSION] heading and the next ## heading.
          # awk: start printing after the matching header line, stop before the next one.
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "ERROR: No entry found in CHANGELOG.md for version [${VERSION}]."
            echo "Update CHANGELOG.md with a section matching '## [${VERSION}]' before tagging a release."
            exit 1
          fi

          echo "$NOTES" > release_notes.md
          echo "--- Release notes to be published ---"
          cat release_notes.md

      - name: Build Binaries
        run: |
          mkdir -p dist
          # Build for Linux (amd64)
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/project-builder-linux-amd64 .
          # Build for Windows (amd64)
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/project-builder-windows-amd64.exe .
          # Build for macOS (amd64)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/project-builder-darwin-amd64 .
          # Build for macOS (arm64)
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/project-builder-darwin-arm64 .
          # Copy desktop file for Linux release
          cp project-builder.desktop dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
